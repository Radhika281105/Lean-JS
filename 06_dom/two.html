<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    const parent = document.querySelector('.parent');
    // console.log(parent);
    // console.log(parent.children);

    // for(let i=0; i<parent.children.length; i++){
    //     console.log(parent.children[[i]]);
    // }

    parent.children[1].style.color = 'red';
    console.log(parent.firstElementChild); //monday
    console.log(parent.lastElementChild); //thursady

    // it will select the parent element using the child
    const dayOne = document.querySelector('.day');
    console.log(dayOne); //monday
    console.log(dayOne.parentElement); //parent
    console.log(dayOne.nextElementSibling); //tuesday
    console.log(dayOne.nextElementSibling.nextElementSibling); //wednesday

    console.log("Nodes: ", parent.childNodes); // it will give us all the nodes including text nodes

    // nodelist is a compolex tree structure

</script>
</html>
